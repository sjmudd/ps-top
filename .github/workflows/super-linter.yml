---
name: Super-Linter

# Provide minimal permissions required for linters to post annotations/checks
permissions:
  contents: read

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  prechecks:
    name: Go pre-checks (vet & test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: "1.26"

      - name: Run go vet and tests
        run: |
          go version
          go vet ./...
          go test ./...

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    needs: prechecks
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: "1.26"

      - name: Install golangci-lint
        run: |
          pkg="github.com/golangci/golangci-lint/v2/cmd/golangci-lint"
          go install "$pkg@v2.11.4"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run golangci-lint
        run: golangci-lint run ./...

  super-linter:
    name: Super-Linter
    runs-on: ubuntu-latest
    needs: prechecks
    permissions:
      contents: read
      checks: write
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Run Super-Linter
        uses: github/super-linter@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: master
          # Enable all linters but skip GO (handled by prechecks).
          VALIDATE: true
          VALIDATE_GO: false
          # Disable zizmor linter (requires pinned hashes, too strict).
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
          # Disable jscpd duplicate code detection (too strict for test files).
          VALIDATE_JSCPD: false
          # Disable biome format for local Claude settings file.
          VALIDATE_BIOME_FORMAT: false
