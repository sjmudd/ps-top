---
name: Super-Linter

# Provide minimal permissions required for linters to post annotations/checks
permissions:
  contents: read

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  prechecks:
    name: Go pre-checks (vet & test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          check-latest: true

      - name: Run go vet and tests
        run: |
          go version
          go vet ./...
          go test ./...

  super-linter:
    name: Super-Linter
    runs-on: ubuntu-latest
    needs: prechecks
    permissions:
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Run Super-Linter
        uses: github/super-linter@454ba4482ce2cd0c505bc592e83c06e1e37ade61
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: master
          # Enable Go validation inside the Super-Linter container. If the
          # containerized typecheck reproduces locally, we still run `go vet`
          # and `go test` in the prechecks job above, but CI will also exercise
          # the linters shipped with Super-Linter.
          VALIDATE_GO: true
          # Keep JSCPD enabled (duplicate detection).
          # Tune with JSCPD_EXCLUDE_PATTERNS if needed.
          VALIDATE_JSCPD: true
          LINTERS_GO: "go vet,go test,go fmt,go mod"
